# Docker Compose configuration for Possibilista's PostgreSQL (US#9402358) and backend
# (US#9402359) containers. Both services share this file's default network, so the backend
# reaches PostgreSQL at the hostname `postgres` (the service name below) rather than
# `localhost` — no extra network config needed.

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: possibilista-postgres
    environment:
      # Defaults match backend/config.py's default database_url; override via a .env file
      # or the shell environment if you need different credentials.
      POSTGRES_USER: ${POSTGRES_USER:-possibilista}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-possibilista}
      POSTGRES_DB: ${POSTGRES_DB:-possibilista}
    ports:
      # Host port is overridable via POSTGRES_HOST_PORT — if 5432 is already taken on your
      # machine, run `POSTGRES_HOST_PORT=5433 docker compose up` instead of editing this
      # file. See the "PostgreSQL Port Conflict Resolution" section in README.md.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      # Named volume persists database data across container restarts/recreations.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-possibilista}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      # Context is the repo root, not backend/, since backend/Dockerfile COPYs both
      # backend/ and migrations/ — both live above the backend/ directory itself.
      context: .
      dockerfile: backend/Dockerfile
    container_name: possibilista-backend
    environment:
      # Overrides Settings' localhost default (backend/config.py) to point at the postgres
      # service by name, since the two containers don't share a network namespace.
      # validate_required_environment_variables() exits immediately if this is unset —
      # try `docker compose run -e DATABASE_URL= backend` to see the failure scenario.
      DATABASE_URL: >-
        ${DATABASE_URL:-postgresql+psycopg://possibilista:possibilista@postgres:5432/possibilista}
    ports:
      # Host port is overridable via BACKEND_HOST_PORT, same pattern as postgres's
      # POSTGRES_HOST_PORT — see the README's port conflict section.
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
